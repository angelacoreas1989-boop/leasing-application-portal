<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leasing Application Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #2d3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    #loginScreen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #2d3e50, #4b6584);
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      background: #2d3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 5px;
    }

    button:hover {
      background: #1f2a38;
    }

    #app {
      display: none;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout {
      width: auto;
      background: crimson;
      padding: 8px 12px;
    }

    .actions button {
      width: auto;
      margin-right: 5px;
    }

    .approve { background: green; }
    .deny { background: darkred; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <header>
    <div class="topbar">
      <h2>Leasing Application Portal</h2>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">

    <h3>New Application</h3>

    <form id="appForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="property" placeholder="Property" required>
      <input type="number" id="income" placeholder="Income" required>
      <textarea id="notes" placeholder="Notes"></textarea>

      <button type="submit">Submit Application</button>
    </form>

    <h3>Applications</h3>
    <div id="list"></div>

  </div>
</div>

<script>
let applications = JSON.parse(localStorage.getItem("applications")) || [];

// LOGIN
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "Angela" && pass === "WGU2028") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } else {
    alert("Invalid login");
  }
}

// LOGOUT
function logout() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

// SUBMIT APPLICATION
document.getElementById("appForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const app = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    property: document.getElementById("property").value,
    income: document.getElementById("income").value,
    notes: document.getElementById("notes").value,
    status: "Pending"
  };

  applications.push(app);
  localStorage.setItem("applications", JSON.stringify(applications));

  this.reset();
  render();
});

// RENDER LIST
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  applications.forEach((app, index) => {
    list.innerHTML += `
      <div class="card">
        <b>${app.name}</b> (${app.email})<br>
        Property: ${app.property}<br>
        Income: $${app.income}<br>
        Status: ${app.status}<br>
        <div class="actions">
          <button class="approve" onclick="approve(${index})">Approve</button>
          <button class="deny" onclick="deny(${index})">Deny</button>
        </div>
      </div>
    `;
  });
}

// APPROVE / DENY
function approve(i) {
  applications[i].status = "Approved";
  save();
}

function deny(i) {
  applications[i].status = "Denied";
  save();
}

function save() {
  localStorage.setItem("applications", JSON.stringify(applications));
  render();
}
</script>

</body>
</html>
