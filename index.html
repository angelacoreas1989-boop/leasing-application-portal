<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leasing Application Portal</title>

  <style>
    :root {
      --pink: #ff69b4;
      --soft-pink: #ffe4f1;
      --dark: #1f2937;
      --muted: #6b7280;
      --bg: #f7f7fb;
      --white: #ffffff;
      --green: #16a34a;
      --yellow: #ca8a04;
      --red: #dc2626;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fff, var(--soft-pink));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(255, 105, 180, 0.18);
      border: 1px solid rgba(255, 105, 180, 0.25);
      text-align: center;
    }

    h1 {
      color: var(--pink);
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 8px;
      font-weight: bold;
      color: var(--dark);
    }

    input {
      width: 100%;
      padding: 13px;
      margin-bottom: 18px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.15);
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 30px;
      background: var(--pink);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e75480;
      transform: translateY(-2px);
    }

    .hint {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      background: #fff7fb;
      padding: 12px;
      border-radius: 12px;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
    }

    .success {
      color: var(--green);
    }

    .error {
      color: var(--red);
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h1>✦ Leasing Application Portal ✦</h1>

    <p class="subtitle">
      Secure access simulation for reviewing leasing applications and workflow activity.
    </p>

    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" />

      <button type="submit">Log In</button>
    </form>

    <p class="hint">
      Demo Login: Angela / WGU2028
    </p>

    <p id="message" class="message"></p>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "Angela" && password === "WGU2028") {
        message.textContent = "Welcome, Angela. Loading Application Dashboard...";
        message.className = "message success";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);
      } else {
        message.textContent = "Invalid login. Please try again.";
        message.className = "message error";
      }
    });
  </script>
</body>
</html>
